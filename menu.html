<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flavorz - Our Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Staatliches&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e2b3a3 0%, #3d261d 100%);
            min-height: 100vh;
            color: white;
            padding-bottom: 50px;
        }

        /* --- Navigation --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            background: linear-gradient(to right, #b07d62, #3b1e11);
            height: 80px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid rgb(3, 3, 3);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 15px;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            padding: 8px 15px;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 0.9rem;
        }

        .nav-links a.active {
            color: #f9b233;
            border-color: #f9b233;
        }

        .order-btn {
            background-color: #fdb851;
            color: black;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            font-family: 'Staatliches', cursive;
        }

        /* --- Menu Grid Styling --- */
        .menu-grid {
            max-width: 1200px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            padding: 0 40px;
        }

        /* NEW: Style for the clickable link */
        .menu-item a {
            text-decoration: none;
            color: inherit; /* Keeps the text white */
            display: block;
            transition: transform 0.3s ease;
        }

        .menu-item a:hover {
            transform: translateY(-10px); /* Lifts the item slightly on hover */
        }

        .menu-item img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .menu-item h3 {
            font-family: 'Staatliches', cursive;
            font-size: 1.4rem;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .menu-item p {
            color: #fdb851;
            font-weight: 600;
            font-size: 1.1rem;
        }

        /* Existing Header/Category styles */
        .menu-header { text-align: center; margin-top: 40px; }
        .menu-header h1 { font-family: 'Staatliches', cursive; font-size: 3rem; }
        .categories { display: flex; justify-content: center; gap: 20px; margin: 30px 0; }
        .cat-btn { background: rgba(255, 255, 255, 0.2); border: none; color: white; padding: 8px 25px; font-family: 'Staatliches', cursive; cursor: pointer; }
        .cat-btn.active { background: #a89434; color: black; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <img src="Images/logo.jpg" alt="Logo">
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="menu.html" class="active">Menu</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="service.html">Service</a></li>
        </ul>
        <a href="#" class="order-btn">Order Now</a>
    </nav>

    <header class="menu-header">
        <h1>Our Menu</h1>
        <p>Explore our Delicious Menu</p>
    </header>

    <div class="categories">
        <button class="cat-btn active">All</button>
        <button class="cat-btn">Main Course</button>
        <button class="cat-btn">Starter</button>
        <button class="cat-btn">Beverage</button>
    </div>

    <div class="menu-grid">
        <div class="menu-item">
            <a href="food.html">
                <img src="Images/Salmon.jpg" alt="Grilled Salmon">
                <h3>Grilled Salmon</h3>
                <p>$34.99</p>
            </a>
        </div>


        <div class="menu-item">
            <a href="chicken-alfredo.html">
                <img src="Images/chicken.jpg" alt="Chicken Alfredo">
                <h3>Chicken Alfredo</h3>
                <p>$20.00</p>
            </a>
        </div>

        <div class="menu-item">
            <a href="magerita-pizza.html">
                <img src="Images/img7.jpg" alt="Magerita Pizza">
                <h3>Magerita Pizza</h3>
                <p>$28.12</p>
            </a>
        </div>

        <div class="menu-item">
            <a href="pumking-soup.html">
                <img src="Images/img10.jpg" alt="Pumking Soup">
                <h3>Pumking Soup</h3>
                <p>$22.18</p>
            </a>
        </div>

        <div class="menu-item">
            <a href="salad.html">
                <img src="Images/img11.jpg" alt="Salad">
                <h3>Salad</h3>
                <p>$14.89</p>
            </a>
        </div>

        <div class="menu-item">
            <a href="burger.html">
                <img src="Images/img12.jpg" alt="Burger">
                <h3>Burger</h3>
                <p>$13.11</p>
            </a>
        </div>

        <div class="menu-item">
            <a href="tiramisu.html">
                <img src="Images/img8.jpg" alt="Tiramisu Cake">
                <h3>Tiramisu Cake</h3>
                <p>$19.4</p>
            </a>
        </div>

        <div class="menu-item">
            <a href="passionate.html">
                <img src="Images/img9.jpg" alt="Passionate">
                <h3>Passionate</h3>
                <p>$12.22</p>
            </a>
        </div>
    </div>

</body>
</html>
