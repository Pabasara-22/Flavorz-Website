<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flavorz - Contact Us</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Staatliches&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e2b3a3 0%, #3d261d 100%);
            min-height: 100vh;
            color: white;
        }

        /* --- Navbar --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            background: linear-gradient(to right, #b07d62, #3b1e11);
            height: 80px;
        }

        .logo img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid rgb(3, 3, 3);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 15px;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            padding: 8px 15px;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .nav-links a.active {
            color: #f9b233;
            border-color: #f9b233;
        }

        .order-btn {
            background-color: #fdb851;
            color: black;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            font-family: 'Staatliches', cursive;
        }

        /* --- Main Content --- */
        .container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 40px;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 50px;
            align-items: flex-start;
        }

        /* Left Side: Get In Touch */
        .get-in-touch h1 {
            font-family: 'Staatliches', cursive;
            font-size: 3rem;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .get-in-touch p.tagline {
            font-size: 1.1rem;
            margin-bottom: 40px;
            color: #fdb851;
        }

        .info-list {
            list-style: none;
        }

        .info-item {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 25px;
        }

        .info-item i {
            font-size: 1.2rem;
            color: #3b1e11;
            background: #b07d62;
            padding: 10px;
            border-radius: 5px;
        }

        .info-text h4 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .info-text p {
            font-size: 0.9rem;
            color: #eee;
        }

        /* Right Side: Message Card */
        .message-card {
            background: white;
            color: #333;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .message-card h2 {
            font-family: 'Staatliches', cursive;
            font-size: 2.2rem;
            margin-bottom: 25px;
            color: #222;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 10px;
            background: #e8e8e8;
            font-size: 0.95rem;
        }

        .form-group textarea {
            height: 100px;
            resize: none;
        }

        .send-btn {
            width: 100%;
            background-color: #d49a3d;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.3rem;
            font-family: 'Staatliches', cursive;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .send-btn:hover {
            background-color: #b88634;
            transform: translateY(-2px);
        }

        /* Responsive Design */
        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
            nav { padding: 0 20px; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <img src="Images/logo.jpg" alt="Logo">
        </div>
        <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
            <li><a href="service.html">Service</a></li>
        </ul>
        <a href="#" class="order-btn">Order Now</a>
    </nav>

    <div class="container">
        <section class="get-in-touch">
            <h1>Get In Touch</h1>
            <p class="tagline">We'd love to hear from you!</p>
            
            <div class="info-list">
                <div class="info-item">
                    <i class="fa-solid fa-location-dot"></i>
                    <div class="info-text">
                        <h4>Address</h4>
                        <p>No 24, Galle Road, Colombo 04.</p>
                    </div>
                </div>
                <div class="info-item">
                    <i class="fa-solid fa-phone"></i>
                    <div class="info-text">
                        <h4>Phone</h4>
                        <p>041-2534467</p>
                    </div>
                </div>
                <div class="info-item">
                    <i class="fa-solid fa-envelope"></i>
                    <div class="info-text">
                        <h4>Email</h4>
                        <p>info@flavorz.com</p>
                    </div>
                </div>
                <div class="info-item">
                    <i class="fa-solid fa-clock"></i>
                    <div class="info-text">
                        <h4>Open hours</h4>
                        <p>Mon-Sun 10 AM to 11 PM</p>
                    </div>
                </div>
            </div>
        </section>

        <section class="message-card">
            <h2>Send Us a Message</h2>
            <form>
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" placeholder="Enter your Name">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="Enter your Email">
                </div>
                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" placeholder="Enter Subject">
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea placeholder="Type your Message here..."></textarea>
                </div>
                <button type="submit" class="send-btn">Send Message</button>
            </form>
        </section>
    </div>

</body>
</html>
