<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flavorz - Grilled Salmon</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Staatliches&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e2b3a3 0%, #3d261d 100%);
            min-height: 100vh;
            color: white;
        }

        /* --- Navbar --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            background: linear-gradient(to right, #b07d62, #3b1e11);
            height: 80px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid rgb(7, 7, 7);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 15px;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            padding: 8px 15px;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 0.9rem;
        }

        .nav-links a.active {
            color: #f9b233;
            border-color: #f9b233;
        }

        .order-btn {
            background-color: #fdb851;
            color: black;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            font-family: 'Staatliches', cursive;
        }

        /* --- Breadcrumb --- */
        .breadcrumb {
            margin: 40px 0 20px 10%;
            font-size: 1.1rem;
            color: #ccc;
        }

        .breadcrumb a {
            color: #ccc;
            text-decoration: none;
        }

        .breadcrumb span {
            color: #fdb851;
        }

        /* --- Product Container --- */
        .product-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            padding: 0 5%;
            align-items: center;
        }

        .product-image img {
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        /* --- Details --- */
        .product-details h1 {
            font-family: 'Staatliches', cursive;
            font-size: 3.5rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .price {
            color: #fdb851;
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .description {
            font-size: 1rem;
            line-height: 1.6;
            color: #eee;
            margin-bottom: 30px;
        }

        /* --- Options --- */
        .option-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .size-btns {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .size-btn {
            padding: 8px 30px;
            border-radius: 8px;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .size-btn.active {
            background: white;
            color: black;
        }

        .size-btn.inactive {
            background: #ccc;
            color: #666;
        }

        /* --- Add-ons --- */
        .addon-group {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.1rem;
        }

        .addon-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
        }

        .addon-price {
            margin-left: auto;
        }

        /* --- Quantity and Cart --- */
        .cart-actions {
            margin-top: 35px;
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .quantity-selector {
            display: flex;
            align-items: center;
            background: #eee;
            color: black;
            border-radius: 5px;
        }

        .qty-btn {
            background: none;
            border: none;
            padding: 5px 12px;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .qty-value {
            padding: 0 10px;
            font-weight: 600;
        }

        .add-to-cart {
            background-color: #fdb851;
            color: black;
            border: none;
            padding: 12px 60px;
            border-radius: 8px;
            font-family: 'Staatliches', cursive;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .add-to-cart:hover {
            background-color: #e5a545;
        }

        @media (max-width: 900px) {
            .product-container { grid-template-columns: 1fr; text-align: center; }
            .size-btns, .cart-actions { justify-content: center; }
            .addon-group { justify-content: center; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <img src="Images/logo.jpg" alt="Logo">
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="menu.html" class="active">Menu</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="#">Service</a></li>
        </ul>
        <a href="#" class="order-btn">Order Now</a>
    </nav>

    <div class="breadcrumb">
        <a href="home.html">Home</a> > <a href="menu.html">Menu</a> > <span>Grilled Salmon</span>
    </div>

    <div class="product-container">
        <div class="product-image">
            <img src="Images/salmon.jpg" alt="Grilled Salmon">
        </div>

        <div class="product-details">
            <h1>Grilled Salmon</h1>
            <p class="price">$34.99</p>
            <p class="description">
                A perfect grilled Salmon served with seasoned vegetables and lemon butter sauce.
            </p>

            <p class="option-title">Size</p>
            <div class="size-btns">
                <button class="size-btn active">Regular</button>
                <button class="size-btn inactive">Large</button>
            </div>

            <p class="option-title">Add-ons</p>
            <div class="addon-group">
                <input type="checkbox"> Extra Sauce <span class="addon-price">$2.00</span>
            </div>
            <div class="addon-group">
                <input type="checkbox"> Extra Veggies <span class="addon-price">$1.50</span>
            </div>

            <div class="cart-actions">
                <p>Quantity</p>
                <div class="quantity-selector">
                    <button class="qty-btn">-</button>
                    <span class="qty-value">1</span>
                    <button class="qty-btn">+</button>
                </div>
                <button class="add-to-cart">Add to Cart</button>
            </div>
        </div>
    </div>

</body>
</html>
