<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flavorz - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* (Keeping your existing CSS styles) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a;
        }

        .login-container {
            display: flex;
            width: 900px;
            height: 550px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .left-panel {
            flex: 1;
            background: url('images/img2.jpg') center/cover no-repeat;
            position: relative;
            padding: 40px;
        }

        .overlay-text {
            position: relative;
            z-index: 2;
            color: white;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        .overlay-text h1 {
            font-size: 2.5rem;
            font-weight: 600;
        }

        .overlay-text p {
            font-size: 1rem;
            font-weight: 300;
        }

        .right-panel {
            flex: 0.8;
            background: linear-gradient(135deg, #e2b3a3 0%, #7c4d3d 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .form-box { width: 100%; }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        h2 { font-size: 2rem; color: #1a1a1a; }

        .logo img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
        }

        .sub-text {
            font-size: 0.85rem;
            margin-bottom: 30px;
            color: #2e2e2e;
        }

        .input-group { margin-bottom: 20px; }

        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: white;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            background: #d1d1d1;
            outline: none;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            color: white;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #d19591;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .login-btn:hover { background-color: #c07d79; }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: white;
        }

        .footer-text a {
            color: #d4e157;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="left-panel">
            <div class="overlay-text">
                <h1>Welcome Back!</h1>
                <p>login to continue your delicious journey</p>
            </div>
        </div>

        <div class="right-panel">
            <div class="form-box">
                <div class="header-row">
                    <h2>Login</h2>
                    <div class="logo">
                        <img src="images/logo.jpg" alt="Logo">
                    </div>
                </div>
                <p class="sub-text">Welcome back! Please login to your account</p>

                <form id="loginForm">
                    <div class="input-group">
                        <label>UserName</label>
                        <input type="text" id="username" placeholder="Enter the user name" required>
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="Enter the Password" required>
                    </div>

                    <div class="remember-me">
                        <label>Remember me</label>
                        <input type="checkbox">
                    </div>

                    <button type="submit" class="login-btn">Login</button>
                </form>

                <p class="footer-text">Don't have an account? <a href="signup.html">signup</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevents the form from just refreshing the page
            
            // In a real app, you would check the username and password here.
            // For now, we will redirect straight to the home page.
            window.location.href = "home.html"; 
        });
    </script>
</body>
</html>
